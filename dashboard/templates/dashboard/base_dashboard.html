{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ellenco Estágios - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Open Sans', sans-serif; font-size: 0.95rem; }
        .tweezer-navbar { background-color: #fff; border-bottom: 1px solid #dee2e6; }
        .navbar-brand img { height: 40px; }
        .nav-link { color: #495057 !important; font-weight: 500; }
        .nav-link:hover { color: #0d6efd !important; }
        .nav-link.active { color: #0d6efd !important; border-bottom: 2px solid #0d6efd; padding-bottom: 0.25rem; }
        .user-profile img { width: 40px; height: 40px; border-radius: 50%; }
        .btn-check:checked+.btn, .btn.active, .btn.show, .btn:first-child:active, :not(.btn-check)+.btn:active {
            background-color: transparent; border-color: transparent;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg tweezer-navbar py-2 px-3">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">
            <img src="{% static 'images/LOGO.jpg' %}" alt="Ellenco Estágios"> </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link active" href="#"><i class="fas fa-home me-1"></i> Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-edit me-1"></i> Cadastros</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-folder me-1"></i> Processos</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-search me-1"></i> Consultas</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-chart-line me-1"></i> Relatórios</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-cog me-1"></i> Gerenciamento</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-question-circle me-1"></i> Ajuda</a></li>
            </ul>
            <div class="d-flex align-items-center">
                <a href="#" class="nav-link position-relative me-3 p-0">
                    <i class="far fa-bell fa-lg"></i>
                    {% if notificacoes_ativas %}
                    <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
                    {% endif %}
                </a>
                <div class="dropdown">
                    <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle user-profile" id="userDropdown" data-bs-toggle="dropdown">
                        <img src="{% static 'images/user.jpg' %}" alt="Suporte"> <span class="ms-2 text-dark">Suporte</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#">Perfil</a></li>
                        <li><a class="dropdown-item" href="#">Configurações</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#">Sair</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="container-fluid mt-4 px-3 mb-5">
    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
