{% extends 'dashboard/base_dashboard.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 mt-4">
            <div class="card-header bg-success text-white py-3">
                <h5 class="mb-0"><i class="fas fa-link me-2"></i> Vincular à Vaga</h5>
            </div>
            <div class="card-body p-4">
                
                <div class="alert alert-light border border-success border-start-5 border-start-success mb-4">
                    <strong>Candidato Selecionado:</strong> {{ candidato.nome }}
                </div>

                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Selecione a Vaga (Somente Abertas)</label>
                        {{ form.vaga }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Status do Processo</label>
                        {{ form.status }}
                        <div class="form-text">Qual a etapa atual do candidato nesta vaga?</div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{% url 'perfil_candidato' candidato.id %}" class="btn btn-light px-4">Cancelar</a>
                        <button type="submit" class="btn btn-success px-4">
                            <i class="fas fa-check me-2"></i> Confirmar Vínculo
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
