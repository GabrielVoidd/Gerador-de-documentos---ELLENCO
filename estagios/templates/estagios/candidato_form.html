<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha do Candidato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light pb-5">

<div class="container-fluid mt-3 mt-md-5 px-2 px-md-3">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white py-3">
                    <h4 class="mb-0">Ficha de Cadastro</h4>
                </div>
                <div class="card-body p-3 p-md-4">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}

                        {% for field in form %}
                            <div class="mb-3">
                                <label class="form-label fw-bold">
                                    {{ field.label }}
                                    {% if field.field.required %}
                                        <span class="text-danger" title="Este campo é obrigatório">*</span>
                                    {% endif %}
                                </label>
                                {{ field }}
                                {% if field.help_text %}
                                    <div class="form-text">{{ field.help_text }}</div>
                                {% endif %}
                                {% for error in field.errors %}
                                    <div class="text-danger small">{{ error }}</div>
                                {% endfor %}
                            </div>
                        {% endfor %}

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-success btn-lg py-3">Enviar Meus Dados</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Mantém o form.media caso algum outro componente do Django precise dele -->
{{ form.media }}

<!-- IMPORTAÇÃO DO JQUERY E DA MÁSCARA -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>

<script>
    $(document).ready(function() {
        // Máscara para a Data de Nascimento
        $('#id_data_nascimento').mask('00/00/0000');

        // BÔNUS: Máscaras extras já configuradas (se existirem no form, já funcionam)
        if ($('#id_cpf').length) {
            $('#id_cpf').mask('000.000.000-00', {reverse: true});
        }

        if ($('#id_rg').length) {
            // Máscara de RG que aceita a letra X no final
            $('#id_rg').mask('00.000.000-A', {
                translation: {
                    'A': {pattern: /[0-9xX]/}
                },
                reverse: true
            });
        }

        if ($('#id_celular').length || $('#id_telefone').length) {
            $('#id_celular').mask('(00) 00000-0000');
            $('#id_telefone').mask('(00) 00000-0000');
        }
    });
</script>

</body>
</html>
