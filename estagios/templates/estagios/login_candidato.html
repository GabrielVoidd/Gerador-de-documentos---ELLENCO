<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login Candidato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-6 col-lg-4">
            <div class="card shadow">
                <div class="card-body p-4 p-md-5">
                    <h3 class="text-center mb-4">Acesso do Candidato</h3>

                    <div class="alert alert-info text-center" role="alert">
                        <strong>Usuário:</strong> Candidato <br>
                        <strong>Senha:</strong> qweasd!Q
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <input type="hidden" name="next" value="{% url 'candidato_novo' %}">

                        <div class="mb-3">
                            <label class="form-label">Usuário</label>
                            <input type="text" name="username" class="form-control" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Senha</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Entrar e Preencher Ficha</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
